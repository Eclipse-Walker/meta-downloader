name: Release

on:
  push:
    tags:
      - 'v*'
  # Tags pushed by the bump-version workflow use GITHUB_TOKEN, which never
  # triggers on:push (recursion guard) — so bump-version dispatches this
  # workflow explicitly on the new tag instead.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run compile

      - name: Build extension zips
        run: |
          bun run zip
          bun run zip:firefox

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" .output/*.zip --generate-notes
