name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # npm version updates package.json, commits, and tags vX.Y.Z in one step.
      - name: Bump version
        id: bump
        run: |
          NEW_TAG=$(npm version ${{ inputs.bump }} -m "chore: bump version to %s")
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags

      # The tag above was pushed with GITHUB_TOKEN, which never triggers
      # on:push workflows (recursion guard) — dispatch the release directly.
      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref '${{ steps.bump.outputs.tag }}'
